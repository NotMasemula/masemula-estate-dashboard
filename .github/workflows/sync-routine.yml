name: Sync Routine to Dashboard

on:
  push:
    paths:
      - 'docs/routine-schedule.json'
      - 'docs/time-routine.md'
  schedule:
    # Run daily at 03:00 UTC to keep the dashboard in sync
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Routine to Supabase

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::SUPABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set"
            exit 1
          fi
          echo "✓ Required secrets are present"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync routine schedule to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ROUTINE_USER_ID: ${{ secrets.ROUTINE_USER_ID || 'ntobeko-masemula-routine' }}
        run: node scripts/sync-routine.mjs

      - name: Report sync result
        if: success()
        run: echo "✅ Routine synced successfully at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Routine sync failed — check the logs above for details"
          exit 1

