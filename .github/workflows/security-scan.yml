name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run every Monday at 09:00 SAST (07:00 UTC)
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  secret-scan:
    name: Scan for Exposed Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for thorough scanning

      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  dependency-audit:
    name: Check Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for package.json
        id: check-package
        run: |
          if [ -f "package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
            echo "No package.json found - skipping npm audit"
          fi

      - name: Run npm audit
        if: steps.check-package.outputs.has_package == 'true'
        run: npm audit --audit-level=high
        continue-on-error: true

  gitignore-check:
    name: Verify .gitignore Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for .env files not in .gitignore
        run: |
          echo "Checking for potentially sensitive files..."
          
          # Check if any .env files are tracked (they should NOT be)
          if git ls-files | grep -E '\.env$|\.env\.local$|\.env\.production$'; then
            echo "❌ ERROR: .env files are tracked by git! Remove them immediately."
            echo "Run: git rm --cached .env"
            exit 1
          else
            echo "✅ No .env files tracked by git"
          fi
          
          # Check for common secret file patterns
          SECRET_PATTERNS=("*-credentials.json" "*-keys.txt" "*.pem" "*.key" "*secret*")
          FOUND=false
          
          for pattern in "${SECRET_PATTERNS[@]}"; do
            if git ls-files | grep -q "$pattern" 2>/dev/null; then
              echo "⚠️  WARNING: Potentially sensitive file found: $pattern"
              FOUND=true
            fi
          done
          
          if [ "$FOUND" = false ]; then
            echo "✅ No suspicious credential files found in git tracking"
          fi

  security-headers-check:
    name: Check Security Headers (if served)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML for security meta tags
        run: |
          if [ -f "index.html" ]; then
            echo "Checking index.html for security best practices..."
            
            # Check for Content Security Policy
            if grep -q "Content-Security-Policy" index.html; then
              echo "✅ Content-Security-Policy found"
            else
              echo "ℹ️  Note: Consider adding Content-Security-Policy meta tag"
            fi
            
            # Check for hardcoded API keys (basic patterns)
            if grep -iE "(sk_live_|sk_test_|rk_live_|whsec_)" index.html; then
              echo "❌ WARNING: Possible Stripe secret key found in HTML!"
              exit 1
            fi
            
            if grep -E "service_role" index.html; then
              echo "❌ WARNING: Supabase service role key may be in HTML!"
              exit 1
            fi
            
            echo "✅ No obvious hardcoded secrets found in index.html"
          fi
